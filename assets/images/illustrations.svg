<!-- ============ SEAU BOKASHI STANDARD (VERT) ============ -->
<svg id="seau-bokashi-vert" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Corps du seau -->
  <path d="M30 60 L40 220 C40 235 55 245 100 245 C145 245 160 235 160 220 L170 60 Z" fill="#7BA05B" stroke="#4A6741" stroke-width="3"/>
  <!-- Couvercle base -->
  <ellipse cx="100" cy="55" rx="75" ry="20" fill="#5B8A42" stroke="#4A6741" stroke-width="3"/>
  <!-- Couvercle top -->
  <ellipse cx="100" cy="50" rx="75" ry="20" fill="#7BA05B" stroke="#4A6741" stroke-width="3"/>
  <!-- Poignée -->
  <rect x="85" y="30" width="30" height="12" rx="6" fill="#4A6741"/>
  <!-- Bandes décoratives -->
  <path d="M35 100 Q100 115 165 100" stroke="#5B8A42" stroke-width="8" stroke-linecap="round"/>
  <path d="M38 160 Q100 175 162 160" stroke="#5B8A42" stroke-width="8" stroke-linecap="round"/>
  <!-- Robinet -->
  <rect x="150" y="200" width="25" height="12" rx="4" fill="#C67D4E"/>
  <circle cx="168" cy="206" r="6" fill="#8B6F47"/>
  <!-- Petites feuilles déco -->
  <path d="M60 130 Q70 120 80 130 Q70 140 60 130" fill="#9DC183"/>
  <path d="M120 180 Q130 170 140 180 Q130 190 120 180" fill="#9DC183"/>
</svg>

