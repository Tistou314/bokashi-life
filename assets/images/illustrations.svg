  <!-- Liquide -->
  <path d="M48 70 L44 175 C44 183 57 188 80 188 C103 188 116 183 116 175 L112 70 Z" fill="#C67D4E" opacity="0.6"/>
  <!-- Bulles -->
  <circle cx="65" cy="120" r="4" fill="#E8A878" opacity="0.5"/>
  <circle cx="90" cy="100" r="6" fill="#E8A878" opacity="0.5"/>
  <circle cx="75" cy="150" r="3" fill="#E8A878" opacity="0.5"/>
  <circle cx="100" cy="140" r="5" fill="#E8A878" opacity="0.5"/>
  <!-- Étiquette -->
  <rect x="52" y="85" width="56" height="35" rx="3" fill="#F3EEE4" stroke="#8B6F47" stroke-width="1"/>
  <text x="80" y="107" text-anchor="middle" font-family="Georgia" font-size="10" fill="#4A6741">JUS</text>
</svg>

