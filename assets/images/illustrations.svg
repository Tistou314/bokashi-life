<!-- ============ ACTIVATEUR / SON DE BOKASHI ============ -->
<svg id="activateur-bokashi" viewBox="0 0 180 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sachet -->
  <path d="M30 50 L30 170 C30 180 40 185 90 185 C140 185 150 180 150 170 L150 50 Z" fill="#F3EEE4" stroke="#8B6F47" stroke-width="3"/>
  <!-- Pli du haut -->
  <path d="M30 50 Q90 30 150 50" stroke="#8B6F47" stroke-width="3"/>
  <path d="M40 50 Q90 35 140 50" fill="#E8DFD0"/>
  <!-- Contenu visible (grains) -->
  <circle cx="60" cy="140" r="6" fill="#C5D9B7"/>
  <circle cx="80" cy="150" r="5" fill="#D4C5A9"/>
  <circle cx="100" cy="145" r="7" fill="#C5D9B7"/>
  <circle cx="120" cy="155" r="5" fill="#D4C5A9"/>
  <circle cx="70" cy="160" r="4" fill="#C5D9B7"/>
  <circle cx="110" cy="165" r="6" fill="#D4C5A9"/>
  <!-- Étiquette -->
  <rect x="50" y="70" width="80" height="50" rx="4" fill="#7BA05B"/>
  <text x="90" y="100" text-anchor="middle" font-family="Georgia" font-size="14" fill="white">EM</text>
  <!-- Micro-organismes stylisés -->
  <circle cx="65" cy="90" r="3" fill="#9DC183"/>
  <circle cx="115" cy="85" r="4" fill="#9DC183"/>
  <circle cx="75" cy="108" r="2" fill="#9DC183"/>
</svg>

<!-- ============ JUS DE BOKASHI ============ -->
<svg id="jus-bokashi" viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
