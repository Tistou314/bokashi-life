<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #E8F0E3 0%, #C5D9B7 50%, #7BA05B 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .logo {
      font-size: 120px;
      margin-bottom: 20px;
    }
    .title {
      font-size: 72px;
      font-weight: 700;
      color: #2D3E28;
      margin-bottom: 10px;
    }
    .title span {
      color: #4A6741;
      font-weight: 400;
    }
    .tagline {
      font-size: 36px;
      color: #4A6741;
      margin-bottom: 40px;
    }
    .features {
      display: flex;
      gap: 40px;
      margin-top: 20px;
    }
    .feature {
      background: rgba(255,255,255,0.9);
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 24px;
      color: #2D3E28;
      font-weight: 500;
    }
    .url {
      position: absolute;
      bottom: 40px;
      font-size: 28px;
      color: #2D3E28;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="logo">🌱</div>
  <div class="title">Bokashi<span>Life</span></div>
  <div class="tagline">Le guide du compostage japonais</div>
  <div class="features">
    <div class="feature">🏠 En appartement</div>
    <div class="feature">🚫 Sans odeur</div>
    <div class="feature">♻️ Zéro déchet</div>
  </div>
  <div class="url">bokashilife.com</div>
</body>
</html>
